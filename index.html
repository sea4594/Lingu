  <body>
    <div id="root"></div>
    <script type="module">
      const isLocalDev =
        window.location.hostname === 'localhost' ||
        window.location.hostname === '127.0.0.1';

      if (isLocalDev) {
        import('/src/main.tsx');
      } else {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = '/Lingu/assets/app.css';
        document.head.appendChild(link);
        const entry = '/Lingu/assets/app.js';
        import(entry);
      }
    </script>
