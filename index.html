<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Lingu/Logo.png" />
    <link rel="apple-touch-icon" href="/Lingu/Logo.png" />
    <link rel="manifest" href="/Lingu/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lingu</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const isLocalDev =
        window.location.hostname === 'localhost' ||
        window.location.hostname === '127.0.0.1';

      if (isLocalDev) {
        import('/src/main.tsx');
      } else {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = '/Lingu/assets/app.css';
        document.head.appendChild(link);
        const entry = '/Lingu/assets/app.js';
        import(entry);
      }
    </script>
  </body>
</html>
